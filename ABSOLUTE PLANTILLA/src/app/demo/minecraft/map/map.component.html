<div class="row">
    <div class="col-sm-12">
        <app-card cardTitle="Interactive World Map" blockClass="p-0 overflow-hidden" [showContent]="true">
            <div class="map-container" style="height: calc(100vh - 250px); min-height: 500px; background: #000;">
                <iframe [src]="mapUrl" width="100%" height="100%" frameborder="0" style="border: none;"
                    allowfullscreen></iframe>

                <!-- Overlay informativo si el mapa está offline -->
                <div class="map-overlay text-center p-5"
                    style="position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; opacity: 0.5;">
                    <p class="text-white-50 f-12">Nota: Asegúrate de que el plugin BlueMap o Dynmap esté instalado y el
                        puerto 8100 esté abierto.</p>
                </div>
            </div>
        </app-card>
    </div>
</div>
