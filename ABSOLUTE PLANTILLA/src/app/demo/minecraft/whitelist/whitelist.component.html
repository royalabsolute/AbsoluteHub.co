<div class="row">
    <div class="col-sm-12">
        <app-card cardTitle="Gestión de Whitelist (Amigos)" [showHeader]="false">
            <div class="row mb-4">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-white">
                            <i class="anticon icon-user"></i>
                        </span>
                        <input type="text" class="form-control bg-dark border-secondary text-white"
                            placeholder="Nombre del jugador (Ej: Notch)" [(ngModel)]="newPlayerName"
                            (keyup.enter)="addPlayer()" [disabled]="loading">
                        <button class="btn btn-primary" type="button" (click)="addPlayer()" [disabled]="loading">
                            <i class="anticon icon-plus-circle me-1"></i> Añadir Amigo
                        </button>
                    </div>
                    <small class="text-muted mt-2 d-block">Nota: El servidor debe estar encendido para procesar los
                        cambios inmediatamente.</small>
                </div>
            </div>

            <hr class="border-secondary opacity-25">

            <div class="row mt-4" *ngIf="whitelist.length > 0; else noPlayers">
                <div class="col-xl-3 col-md-4 col-sm-6 mb-4" *ngFor="let player of whitelist">
                    <div class="card bg-dark border-secondary h-100 player-card overflow-hidden">
                        <div class="card-body p-3 d-flex align-items-center">
                            <div class="skin-wrapper me-3">
                                <img [src]="getPlayerSkin(player.name)" [alt]="player.name"
                                    class="rounded border border-secondary shadow-sm">
                            </div>
                            <div class="player-info flex-grow-1 overflow-hidden">
                                <h6 class="mb-0 text-white text-truncate">{{ player.name }}</h6>
                                <small class="text-muted d-block text-truncate">UUID: {{ player.uuid?.substring(0,8)
                                    }}...</small>
                            </div>
                            <button class="btn btn-icon btn-link-danger p-0" (click)="removePlayer(player.name)"
                                ngbTooltip="Quitar de la lista">
                                <i class="anticon icon-delete"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <ng-template #noPlayers>
                <div class="text-center py-5" *ngIf="!loading">
                    <i class="anticon icon-frown display-4 text-muted mb-3 d-block"></i>
                    <p class="text-muted h5">No hay nadie en la Whitelist todavía.</p>
                    <p class="text-muted small">Añade el nombre de un amigo arriba para empezar.</p>
                </div>
            </ng-template>

            <div class="text-center py-5" *ngIf="loading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="text-muted mt-2">Sincronizando con el servidor...</p>
            </div>
        </app-card>
    </div>
</div>
